<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlurayPOS — Enterprise Point of Sale</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        max-width: 520px;
        text-align: center;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1rem;
        padding: 3rem 2rem;
        backdrop-filter: blur(8px);
      }
      h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #fff; }
      p { color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }
      .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      a:hover { opacity: 0.85; }
      .primary { background: #2563eb; color: #fff; }
      .secondary { background: rgba(255,255,255,0.1); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.2); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>BlurayPOS</h1>
      <p>Enterprise multi-tenant point of sale for restaurants and retail. Manage your business from the office, run terminals in-store.</p>
      <div class="links">
        <a class="primary" href="https://office.bluraymaldives.site">Office Portal</a>
        <a class="secondary" href="https://pos.bluraymaldives.site">POS Terminal</a>
      </div>
    </div>
  </body>
</html>
