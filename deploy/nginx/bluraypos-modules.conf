# Plan module public sites — menu, order, coupons
# Included from sites-enabled; certbot adds HTTPS blocks after setup-subdomains.sh

# Online menu — menu.bluraymaldives.site
server {
    listen 80;
    server_name menu.bluraymaldives.site;

    include /etc/nginx/snippets/bluraypos-compression.conf;

    root /var/www/bluraypos/menu;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Online ordering — order.bluraymaldives.site
server {
    listen 80;
    server_name order.bluraymaldives.site;

    include /etc/nginx/snippets/bluraypos-compression.conf;

    root /var/www/bluraypos/order;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Coupons & lucky draw — coupons.bluraymaldives.site
server {
    listen 80;
    server_name coupons.bluraymaldives.site;

    include /etc/nginx/snippets/bluraypos-compression.conf;

    root /var/www/bluraypos/coupons;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Coupon QR images are served by the API
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
