# BlurayPOS production reverse proxy
# TLS blocks are added by certbot. HTTP blocks redirect to HTTPS after SSL setup.

# Main website — bluraymaldives.site
server {
    listen 80;
    server_name bluraymaldives.site;

    include /etc/nginx/snippets/bluraypos-compression.conf;

    root /var/www/bluraypos/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Office application — office.bluraymaldives.site
server {
    listen 80;
    server_name office.bluraymaldives.site;

    include /etc/nginx/snippets/bluraypos-compression.conf;

    root /var/www/bluraypos/office;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# POS terminal — pos.bluraymaldives.site
server {
    listen 80;
    server_name pos.bluraymaldives.site;

    include /etc/nginx/snippets/bluraypos-compression.conf;

    root /var/www/bluraypos/pos;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Online menu / order / coupons — see bluraypos-modules.conf (sites-enabled)

# API — api.bluraymaldives.site
server {
    listen 80;
    server_name api.bluraymaldives.site;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location ~ ^/(health|ready|live)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        access_log off;
    }
}
