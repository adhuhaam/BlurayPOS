services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pos_prod}
    volumes:
      - pos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos} -d ${POSTGRES_DB:-pos_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-pos_prod};Username=${POSTGRES_USER:-pos};Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?set JWT_SECRET}
      Jwt__Issuer: PosApi
      Jwt__Audience: PosClients
      Cors__Origins__0: ${CORS_ORIGIN_ADMIN:-https://bluraymaldives.site}
      Cors__Origins__1: ${CORS_ORIGIN_POS:-https://pos.bluraymaldives.site}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-pos_prod};Username=${POSTGRES_USER:-pos};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pos_pg_data:
