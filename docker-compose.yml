services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_dev
    ports:
      - "5432:5432"
    volumes:
      - pos_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5142:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=pos_dev;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Jwt__Secret: dev-docker-secret-key-min-32-chars-long!!
      Cors__Origins__0: http://localhost:5173
      Cors__Origins__1: http://localhost:5174
      Cors__Origins__2: http://localhost:5175
    depends_on:
      - postgres
      - redis

volumes:
  pos_pg_data:
